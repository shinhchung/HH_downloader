<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH Video Downloader - Processing</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary: #3b82f6;
      --success: #10b981;
      --error: #ef4444;
      --radius: 12px;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: var(--surface-color);
      padding: 30px;
      border-radius: var(--radius);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 8px;
    }
    #filename {
      color: var(--primary);
      font-weight: 600;
      word-break: break-all;
      margin-bottom: 20px;
      font-size: 14px;
    }
    #status {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      min-height: 20px;
    }
    .progress-container {
      width: 100%;
      height: 12px;
      background: #334155;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    #progress-bar {
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width 0.2s ease, background-color 0.3s;
    }
    #log {
      width: 100%;
      height: 150px;
      background: #000;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      text-align: left;
      padding: 10px;
      box-sizing: border-box;
      border-radius: 6px;
      overflow-y: auto;
      margin-bottom: 20px;
    }
    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      display: none;
    }
    button:hover { background: #2563eb; }
    
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--text-secondary);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script src="vendor/ffmpeg/ffmpeg.js"></script>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h1>Processing Video</h1>
    <div id="filename">Loading...</div>
    <div id="status">Starting process...</div>
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>
    <div id="log"></div>
    <button id="closeBtn">Close Tab</button>
  </div>
  <script src="converter.js"></script>
</body>
</html>
